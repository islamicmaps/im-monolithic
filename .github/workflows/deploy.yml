# Auto-deploy on every push to main.
# Uses GitHub OIDC → AWS IAM (no long-lived keys).
# Manually triggerable via "Run workflow" too.
#
# Required repo variable / secret (set once after CFN stack `islamicmaps-cicd` deploys):
#   AWS_ROLE_ARN  =  output `RoleArn` from the cicd stack

name: deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "schema/**"
      - "examples/**"
      - "pipeline/**"
      - "serverless/src/**"
      - "scripts/deploy.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Avoid two deploys racing.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # No `environment:` here. When set, GitHub builds the OIDC sub claim as
    # `repo:OWNER/REPO:environment:NAME` instead of `:ref:refs/heads/main`,
    # which does NOT match the cicd stack's AssumeRolePolicy. If you ever
    # add a GitHub Environment with reviewer-approval rules, also update
    # infra/cicd.yaml's trust policy to allow that sub form and re-deploy
    # the cicd stack BEFORE re-adding `environment:` here.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema brotli boto3

      - name: Check AWS_ROLE_ARN repo variable is set
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "::error::Repo variable AWS_ROLE_ARN is empty."
            echo "::error::Set it to: arn:aws:iam::<acct>:role/islamicmaps-cicd-github-deploy"
            echo "::error::Settings → Secrets and variables → Actions → Variables → New repository variable"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: gh-deploy-${{ github.run_id }}
          aws-region: us-east-1

      - name: Run deploy.sh
        run: ./scripts/deploy.sh
        env:
          AWS_REGION: us-east-1
          SITE_STACK: islamicmaps-app
          SEARCH_STACK: islamicmaps-search

      - name: Smoke-test live endpoints
        run: |
          set -euo pipefail
          curl -fsS https://app.islamicmaps.org/ -o /dev/null
          curl -fsS https://app.islamicmaps.org/dist/catalog.json -o /dev/null
          curl -fsS https://klc37q0kng.execute-api.us-east-1.amazonaws.com/v1/health -o /dev/null
          rc=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                  -H "content-type: application/json" \
                  -d '{"q":"hijra","mode":"hybrid","k":1}' \
                  https://klc37q0kng.execute-api.us-east-1.amazonaws.com/v1/search)
          test "$rc" = "200"
          echo "Smoke OK"
